---

name: manual-workflow

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Testing against python versions'
        required: true
        default: "3.8"
        type: choice
        options:
        - "3.8"
        - "3.9"
        - "3.10"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: install dependencies
        run: |
          cd chapter4
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: run tests
        run: |
          cd chapter4
          python -m unittest discover

      - name: notify success of build
        if: success()
        run: echo "Tests passed on python ${{ inputs.python-version }}"
