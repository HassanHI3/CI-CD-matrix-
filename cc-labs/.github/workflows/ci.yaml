name: combined test
on: [push]


  jobs:
    build:
      runs on: ubuntu-latest

      strategy:
        matrix:
          python-version: [3.7, 3.8, 3.9]   # test on multiple python versions
        #os: [ubuntu-latest, windows-latest, macos-latest]   # test on multiple operating systems
        # call it using and os ${{ matrix.os }}



      steps:
      - name : checkout-code
        uses: actions/checkout@v2

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: install dependencies
        run: |
          cd chapter 4
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      -name: run tests
      run: |
        cd chapter4
        python -m unittest discover chapter4

      -name: notify success of build
      run: echo "Tests passed on python ${{ matrix.python-version }}"
      if: success()
